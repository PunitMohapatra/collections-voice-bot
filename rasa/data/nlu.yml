# =============================================================================
# Regex Features for Entity Extraction
# =============================================================================
  - regex: amount
    examples: |
      - \d+
      - \d+\.\d+

  - regex: date
    examples: |
      - \d{1,2}/\d{1,2}/\d{2,4}
      - \d{1,2}-\d{1,2}-\d{2,4}
      - \d{4}-\d{2}-\d{2}

  - regex: account_number
    examples: |
      - LN\d{3,}
      - ln\d{3,}

# =============================================================================
# Lookup Tables for better entity recognition
# =============================================================================
  - lookup: date
    examples: |
      - today
      - tomorrow
      - day after tomorrow
      - next week
      - next month
      - this weekend
      - month end
      - aaj
      - kal
      - parson
      - agle hafte
      - agle mahine
      - is weekend
