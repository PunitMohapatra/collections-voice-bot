# =============================================================================
# Rasa NLU Training Data - Debt Collections Voice Bot
# =============================================================================
# Training examples for intent classification and entity extraction.
# Supports English, Hindi, and Hinglish (code-switched) speech.
# Each intent has 15-25 examples for robust classification.
# =============================================================================

version: "3.1"

nlu:

# =============================================================================
# Greeting Intent
# =============================================================================
  - intent: greet
    examples: |
      - hello
      - hi
      - hey
      - hii
      - namaste
      - namaskar
      - namasté
      - good morning
      - good afternoon
      - good evening
      - hi there
      - hello ji
      - haan ji
      - haan bolo
      - kya haal chaal hai
      - kaise ho
      - haan main bol raha hoon
      - haan main sun raha hoon
      - yes speaking
      - yes I am listening
      - haan boliye
      - ji haan
      - haan ji boliye

# =============================================================================
# Goodbye Intent
# =============================================================================
  - intent: goodbye
    examples: |
      - bye
      - goodbye
      - bye bye
      - see you
      - alvida
      - namaste phir milenge
      - theek hai bye
      - okay bye
      - thanks bye
      - dhanyavaad bye
      - good bye
      - talk to you later
      - accha bye
      - ok done bye
      - thank you goodbye
      - theek hai phir baat karte hain
      - chaliye phir

# =============================================================================
# Confirm PTP (Promise to Pay) Intent
# =============================================================================
  - intent: confirm_ptp
    examples: |
      - haan main kar sakta hoon
      - haan payment karunga
      - yes I can pay
      - sure I will pay
      - yes I'll make the payment
      - okay I can do it
      - bilkul main kar sakta hoon
      - haan zaroor karunga
      - theek hai main pay kar dunga
      - main payment kar deta hoon
      - okay I'll pay
      - fine I will pay
      - yes I agree to pay
      - haan main ready hoon payment ke liye
      - main kar lunga payment
      - I will make the payment
      - I promise to pay
      - haan main promise karta hoon
      - okay done main pay karunga
      - sure no problem I will pay

# =============================================================================
# Deny PTP Intent
# =============================================================================
  - intent: deny_ptp
    examples: |
      - nahi abhi nahi kar paunga
      - no I cannot pay now
      - sorry I can't pay
      - nahi mujhe abhi payment nahi karni
      - no I'm not able to pay
      - sorry I can't make this payment
      - abhi mere paas paise nahi hain
      - I don't have money right now
      - main abhi payment nahi kar sakta
      - nahi hoga abhi
      - it's not possible right now
      - abhi nahi ho payega
      - I cannot afford it
      - paise nahi hain mere paas
      - no way I can pay now
      - sorry but I cannot pay
      - meri financial condition theek nahi hai
      - I am facing financial difficulties
      - main jobless hoon abhi
      - nahi kar paunga payment abhi

# =============================================================================
# Provide PTP Date Intent
# =============================================================================
  - intent: provide_ptp_date
    examples: |
      - [15 march](date) ko karunga
      - [20 april](date) tak pay kar dunga
      - main [5 din baad](date) karunga
      - [next week](date) payment kar dunga
      - [next month](date) karunga
      - [10 tarikh](date) ko
      - [aaj](date) hi kar deta hoon
      - [kal](date) kar dunga
      - [parson](date) tak
      - [15th](date) of this month
      - by [30th may](date)
      - I will pay on [march 15](date)
      - [in 5 days](date) I will pay
      - [10th of next month](date)
      - [next friday](date)
      - [this weekend](date) main pay karunga
      - [25 june](date) tak definitely
      - I can pay by [july 10](date)
      - [2 hafte baad](date)
      - [month end](date) tak karunga

# =============================================================================
# Provide PTP Amount Intent
# =============================================================================
  - intent: provide_ptp_amount
    examples: |
      - main [5000](amount) rupaye karunga
      - I can pay [5000](amount) rupees
      - [10000](amount) rupaye de dunga
      - [8000](amount) rupees
      - [15000](amount) rupees
      - [6000](amount) rupaye
      - [20000](amount) rupees
      - [3000](amount) de sakta hoon
      - [7500](amount) karunga
      - [12000](amount) tak de sakta hoon
      - I'll pay [25000](amount)
      - [2000](amount) hi de sakta hoon abhi
      - around [10000](amount) main de sakta hoon
      - maximum [5000](amount) de paunga
      - [4000](amount) rupaye abhi de sakta hoon
      - I can manage [8000](amount) rupees
      - [50000](amount) poora pay kar dunga
      - [1000](amount) abhi ke liye
      - I can give [3500](amount)
      - bas [2500](amount) hi dena hoga

