# ============================================================================
# Voice Bot API - Application Configuration
# ============================================================================
# This file contains all configuration settings for the Spring Boot REST API.
# ============================================================================

# ============================================================================
# Application Metadata
# ============================================================================
spring.application.name=voice-bot-api

# ============================================================================
# Server Configuration
# ============================================================================
server.port=8080

# ============================================================================
# Database Configuration (PostgreSQL)
# ============================================================================
# JDBC connection URL for PostgreSQL database
# Replace YOUR_PASSWORD with your actual PostgreSQL password
spring.datasource.url=jdbc:postgresql://localhost:5432/collections_dev
spring.datasource.username=postgres
spring.datasource.password=all@1234

# Use HikariCP as the default connection pool (high performance)
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# ============================================================================
# JPA/Hibernate Configuration
# ============================================================================
# Do not auto-create tables at runtime - use schema.sql script instead
spring.jpa.hibernate.ddl-auto=none

# Use PostgreSQL dialect for proper SQL generation
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Show SQL queries in console (useful for debugging)
spring.jpa.show-sql=true

# Use standard naming strategy to preserve camelCase column names
# This prevents Hibernate from converting "accountNumber" to "account_number"
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# Enable OpenJPA style validation
spring.jpa.open-in-view=false

# ============================================================================
# Logging Configuration
# ============================================================================
# Set logging level for collections package to DEBUG
logging.level.com.collections=DEBUG

# Log file pattern (optional - uncomment to enable file logging)
# logging.file.name=logs/voice-bot-api.log
# logging.level.root=INFO

# ============================================================================
# CORS Configuration (for bot server to call API)
# ============================================================================
# Allow all origins for development (restrict in production)
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=Origin,Content-Type,Accept,Authorization
spring.web.cors.allow-credentials=true

# ============================================================================
# API Documentation (optional - uncomment to enable Swagger UI)
# ============================================================================
# springdoc.api-docs.enabled=true
# springdoc.swagger-ui.path=/swagger-ui.html
